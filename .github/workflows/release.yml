name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Rename binary
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/speedtest-logger dist/speedtest-logger-linux-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/speedtest-logger-linux-x86_64
          generate_release_notes: true
